version: "3.8"

services:

  # ── MySQL ───────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: dreamify-mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}

    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    networks:
      - dreamify-net

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s


  # ── Spring Boot Backend ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: dreamify-backend
    restart: unless-stopped

    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_PROFILES_ACTIVE: prod

    ports:
      - "8080:8080"

    networks:
      - dreamify-net

    depends_on:
      mysql:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s


  # ── Frontend ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: dreamify-frontend
    restart: unless-stopped

    ports:
      - "80:80"

    networks:
      - dreamify-net

    depends_on:
      backend:
        condition: service_healthy


  # ── Admin Panel ────────────────────────────────────────
  admin:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile

    container_name: dreamify-admin
    restart: unless-stopped

    ports:
      - "8081:80"

    networks:
      - dreamify-net

    depends_on:
      backend:
        condition: service_healthy


# ── Volumes ─────────────────────────────────────────────
volumes:
  mysql_data:


# ── Network ─────────────────────────────────────────────
networks:
  dreamify-net:
    driver: bridge