version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: dreamify-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - dreamify-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 400M

  backend:
    build: ./backend
    container_name: dreamify-backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      # Limits Java Memory directly in the JVM
      JAVA_OPTS: "-Xmx300m -Xms200m"
    networks:
      - dreamify-net
    depends_on:
      mysql:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 450M

  frontend:
    build: ./frontend
    container_name: dreamify-frontend
    restart: unless-stopped
    networks:
      - dreamify-net
    deploy:
      resources:
        limits:
          memory: 64M

  admin:
    build: ./admin-panel
    container_name: dreamify-admin
    restart: unless-stopped
    networks:
      - dreamify-net
    deploy:
      resources:
        limits:
          memory: 64M

  nginx:
    image: nginx:alpine
    container_name: dreamify-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # This allows Nginx container to use the certificates issued by Certbot on the host
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - admin
      - backend
    networks:
      - dreamify-net
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  mysql_data:

networks:
  dreamify-net:
    driver: bridge
