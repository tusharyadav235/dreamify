version: "3.8"

services:
  # 🗄️ Database: MySQL 8.0
  mysql:
    image: mysql:8.0
    container_name: dreamify-mysql
    command:
       - --performance_schema=OFF
       - --innodb_buffer_pool_size=64M
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - dreamify-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p$${MYSQL_ROOT_PASSWORD}"]
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 350M

  # ☕ Backend: Spring Boot (Java 17)
  backend:
    image: ghcr.io/tusharyadav235/dreamify-backend:latest
    container_name: dreamify-backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      # Upload storage — path inside the container
      UPLOAD_DIR: /app/uploads
      # Public base URL used to build video/thumbnail URLs returned to frontend
      # Must match your domain so nginx can proxy /uploads/ correctly
      APP_DOMAIN: ${APP_DOMAIN:-https://dreamify.info}
      # Memory management for 1GB RAM EC2
      JAVA_OPTS: "-Xmx300m -Xms200m"
    volumes:
      # Named volume — persists uploaded videos across image updates and restarts
      # docker compose down does NOT delete this volume
      - uploads_data:/app/uploads
    networks:
      - dreamify-net
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 450M

  # 🌐 Main Frontend
  frontend:
    image: ghcr.io/tusharyadav235/dreamify-frontend:latest
    container_name: dreamify-frontend
    restart: unless-stopped
    networks:
      - dreamify-net
    deploy:
      resources:
        limits:
          memory: 64M

  # 🛠️ Admin Panel
  admin:
    image: ghcr.io/tusharyadav235/dreamify-admin:latest
    container_name: dreamify-admin
    restart: unless-stopped
    networks:
      - dreamify-net
    deploy:
      resources:
        limits:
          memory: 64M

  # 🛡️ Reverse Proxy: Nginx + SSL
  nginx:
    image: nginx:alpine
    container_name: dreamify-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - admin
      - backend
    networks:
      - dreamify-net
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  mysql_data:
  uploads_data:   # ← persists uploaded videos/thumbnails across all deploys

networks:
  dreamify-net:
    driver: bridge