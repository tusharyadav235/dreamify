# ─────────────────────────────────────────────────────────────────
#  Dreamify — Nginx Reverse Proxy
#  Handles: SSL termination, routing to frontend/admin/backend
# ─────────────────────────────────────────────────────────────────

# Redirect all HTTP → HTTPS
server {
    listen 80;
    server_name dreamify.info www.dreamify.info;
    return 301 https://$host$request_uri;
}

# ── Main Website (dreamify.info) ──────────────────────────────────
server {
    listen 443 ssl;
    server_name dreamify.info www.dreamify.info;

    ssl_certificate     /etc/letsencrypt/live/dreamify.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dreamify.info/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Allow large uploads through nginx (videos up to 500MB)
    client_max_body_size 500M;

    # ── API calls → Spring Boot backend ──────────────────────────
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout    300s;   # long timeout for video uploads
        proxy_send_timeout    300s;
        client_max_body_size  500M;
    }

    # ── Uploaded videos/thumbnails → backend static files ────────
    # Videos uploaded via admin panel are stored in the backend
    # container at /app/uploads and served via Spring Boot
    location /uploads/ {
        proxy_pass         http://backend:8080/uploads/;
        proxy_set_header   Host      $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_buffering    off;           # stream video without buffering
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Cache video files for 1 day to reduce backend load
        proxy_cache_valid  200 1d;
        add_header         Cache-Control "public, max-age=86400";
    }

    # ── Everything else → frontend static files ───────────────────
    location / {
        proxy_pass         http://frontend:80;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# ── Admin Panel (admin.dreamify.info) ─────────────────────────────
server {
    listen 443 ssl;
    server_name admin.dreamify.info;

    ssl_certificate     /etc/letsencrypt/live/dreamify.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dreamify.info/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Large upload support for admin video uploads
    client_max_body_size 500M;

    # ── API calls → backend ───────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        client_max_body_size  500M;
    }

    # ── Uploaded files proxy ──────────────────────────────────────
    location /uploads/ {
        proxy_pass         http://backend:8080/uploads/;
        proxy_set_header   Host      $host;
        proxy_buffering    off;
        proxy_read_timeout 300s;
    }

    # ── Admin panel static files ──────────────────────────────────
    location / {
        proxy_pass         http://admin:80;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}