server {
    listen 80;
    server_name dreamify.info www.dreamify.info;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dreamify.info www.dreamify.info;

    ssl_certificate /etc/letsencrypt/live/dreamify.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dreamify.info/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # ---------------- FRONTEND ----------------
    location / {
        proxy_pass http://dreamify-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------------- ADMIN ----------------
    location /admin/ {
        proxy_pass http://dreamify-admin:80/;  # trailing slash IMPORTANT
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------------- BACKEND ----------------
    location /api/ {
        proxy_pass http://dreamify-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS PREFLIGHT
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'https://dreamify.info' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Accept,Origin' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            return 204;
        }
    }
}
