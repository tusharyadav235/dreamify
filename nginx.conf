server {
    listen 80;
    server_name dreamify.info www.dreamify.info;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dreamify.info www.dreamify.info;

    # SSL Certificate Paths (Linked to the volume in docker-compose)
    ssl_certificate /etc/letsencrypt/live/dreamify.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dreamify.info/privkey.pem;

    # Performance and Security Tweaks
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 1. Main Frontend
    location / {
        proxy_pass http://dreamify-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 2. Admin Panel Fix
    # This ensures that dreamify.info/admin handles internal routing correctly
    location /admin/ {
        proxy_pass http://dreamify-admin:80/; # The trailing slash is vital here
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Backend API
    location /api/ {
        proxy_pass http://dreamify-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
