# ═══════════════════════════════════════════════════════════════════
#  DREAMIFY — UNIFIED BACKEND PIPELINE (V3.0 - Zero Cache / Pure Build)
# ═══════════════════════════════════════════════════════════════════

name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tusharyadav235/dreamify-backend

jobs:
  build-and-deploy:
    name: 🏗️ Fresh Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    # Services required for the test phase
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testroot
          MYSQL_DATABASE: dreamify_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      # ── 1. COMPILE NEW CODE (This destroys the "Ghost JAR") ──
      - name: 📦 Compile & Package JAR
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 3306
          DB_NAME: dreamify_test
          DB_USER: root
          DB_PASSWORD: testroot
        run: |
          mvn clean package -DskipTests
          echo "✅ Fresh JAR created in backend/target/"

      - name: 🔐 Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=raw,value=latest

      - name: 🔧 Set up Buildx
        uses: docker/setup-buildx-action@v3

      # ── 2. BUILD IMAGE (Using the exact JAR we just made) ──
      - name: 🏗️ Build and push
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # CRITICAL: no-cache forces Docker to bake the fresh JAR
          no-cache: true 

      # ── 3. SHIP TO EC2 ──
      - name: 🚀 SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/dreamify
            
            echo "🌿 Syncing Compose files..."
            git fetch --all
            git reset --hard origin/main

            echo "🔑 Authenticating..."
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u tusharyadav235 --password-stdin

            echo "🐳 Pulling & Recreating Backend..."
            docker compose pull backend
            docker compose up -d --no-deps --force-recreate backend

            echo "🧹 Cleaning up..."
            docker image prune -f
            echo "🎉 [SUCCESS] New Code is LIVE on EC2!"
