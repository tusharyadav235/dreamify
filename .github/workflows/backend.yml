# ═══════════════════════════════════════════════════════════════════
#  DREAMIFY — BACKEND CI/CD PIPELINE (V2.0 - GHCR & EC2)
# ═══════════════════════════════════════════════════════════════════

name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tusharyadav235/dreamify-backend

jobs:
  # 🧪 JOB 1: TEST
  test:
    name: 🧪 Test & Lint
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testroot
          MYSQL_DATABASE: dreamify_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: testpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: 🔍 Run Maven Tests
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 3306
          DB_NAME: dreamify_test
          DB_USER: test_user
          DB_PASSWORD: testpass
        run: mvn clean test --batch-mode

  # 🐳 JOB 2: BUILD & PUSH
  build:
    name: 🐳 Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🔐 Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: 🔧 Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build and push
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # ── FORCE REBUILD ──
          no-cache: true
          # ❌ Remove or comment out these two lines for this specific build:
          # cache-from: type=gha
          # cache-to: type=gha,mode=max

  # 🚀 JOB 3: DEPLOY
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: 🚀 SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/dreamify

            echo "🌿 1. Syncing docker-compose and configs..."
            git fetch --all
            git reset --hard origin/main

            echo "🔑 2. Authenticating with GHCR..."
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "🐳 3. Pulling fresh Backend image..."
            docker compose pull backend
            
            echo "🚀 4. Recreating Backend container..."
            # --force-recreate ensures the new JAR file inside the image is used
            docker compose up -d --no-deps --force-recreate backend

            echo "🧹 5. Cleaning up old images..."
            docker image prune -f
            
            echo "🎉 [SUCCESS] Backend deployment is LIVE!"
