# ═══════════════════════════════════════════════════════════════════
#  DREAMIFY — FRONTEND CI/CD PIPELINE
#  Stages: Lint -> Build & Push (GHCR) -> Deploy (EC2)
# ═══════════════════════════════════════════════════════════════════

name: Frontend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"

env:
  REGISTRY: ghcr.io
  # Hardcoded lowercase to prevent Docker 'Invalid Image Name' errors
  IMAGE_NAME: tusharyadav235/dreamify-frontend

jobs:
  # ─────────────────────────────────────────────────────────────
  #  JOB 1 — LINT & VALIDATE
  # ─────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔗 Check for broken links
        uses: lycheeverse/lychee-action@v1
        with:
          args: >-
            --no-progress
            --exclude-loopback
            --exclude "^tel:"
            --exclude "^mailto:"
            --exclude "localhost"
            frontend/index.html
        continue-on-error: true

      - name: 📏 Check file sizes
        run: |
          SIZE=$(wc -c < frontend/index.html)
          echo "index.html size: ${SIZE} bytes"
          if [ $SIZE -gt 2000000 ]; then
            echo "⚠️ Warning: index.html exceeds 2MB"
          fi

  # ─────────────────────────────────────────────────────────────
  #  JOB 2 — BUILD & PUSH
  # ─────────────────────────────────────────────────────────────
  build:
    name: 🐳 Build & Push Image
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build and push
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────
  #  JOB 3 — DEPLOY
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            set -e
            cd ~/dreamify
            
            # 1. Update orchestration files
            git pull origin main

            # 2. Login to Registry on EC2 with your PAT
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u tusharyadav235 --password-stdin

            # 3. Pull and update frontend service
            docker compose pull frontend
            docker compose up -d --no-deps frontend

            # 4. Check if container is healthy
            sleep 5
            if docker compose ps frontend | grep -q "Up"; then
              echo "✅ Frontend deployment successful!"
            else
              echo "❌ Frontend failed to start"
              docker compose logs frontend
              exit 1
            fi
            
            docker image prune -f
