# ═══════════════════════════════════════════════════════════════════
#  DREAMIFY — FRONTEND CI/CD PIPELINE (V2.0 - GHCR & EC2)
# ═══════════════════════════════════════════════════════════════════

name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Matches your GHCR repository structure
  IMAGE_NAME: tusharyadav235/dreamify-frontend

jobs:
  # 🔍 JOB 1: LINT & VALIDATE
  lint:
    name: 🔍 Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 📏 Check file sizes
        run: |
          SIZE=$(wc -c < frontend/index.html)
          echo "index.html size: ${SIZE} bytes"
          if [ $SIZE -gt 5000000 ]; then
            echo "⚠️ Warning: index.html is getting very large!"
          fi

  # 🐳 JOB 2: BUILD & PUSH
  build:
    name: 🐳 Build & Push Image
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build and push
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 🚀 JOB 3: DEPLOY
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            set -e
            cd ~/dreamify
            
            echo "🌿 1. Syncing docker-compose and configs..."
            git fetch --all
            git reset --hard origin/main

            echo "🔑 2. Authenticating with GHCR..."
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u tusharyadav235 --password-stdin

            echo "🐳 3. Pulling fresh Frontend image..."
            docker compose pull frontend
            
            echo "🚀 4. Recreating Frontend container..."
            # --force-recreate ensures we don't serve old cached HTML layers
            docker compose up -d --no-deps --force-recreate frontend

            echo "🧹 5. Cleaning up old layers..."
            docker image prune -f
            
            echo "🎉 [SUCCESS] Frontend is now LIVE and updated!"
