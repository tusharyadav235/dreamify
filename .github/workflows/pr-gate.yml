# ═══════════════════════════════════════════════════════════════════
#  DREAMIFY — PR QUALITY GATE (Optimized)
# ═══════════════════════════════════════════════════════════════════

name: PR Quality Gate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read
  issues: write
  statuses: write

jobs:
  # ─────────────────────────────────────────────────────────────
  #  JOB 1 — SECRET SCAN
  # ─────────────────────────────────────────────────────────────
  secret-scan:
    name: 🔐 Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  #  JOB 2 — BACKEND BUILD CHECK
  # ─────────────────────────────────────────────────────────────
  backend-check:
    name: ☕ Backend Check
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testroot
          MYSQL_DATABASE: dreamify_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: 🧪 Run Maven Tests
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 3306
          DB_NAME: dreamify_test
          DB_USER: root
          DB_PASSWORD: testroot
        run: mvn test --batch-mode

  # ─────────────────────────────────────────────────────────────
  #  JOB 3 — DOCKER BUILD CHECK (Parallel Matrix)
  # ─────────────────────────────────────────────────────────────
  docker-build-check:
    name: 🐳 Docker Build Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - { name: backend, context: backend }
          - { name: frontend, context: frontend }
          - { name: admin, context: admin-panel }

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build ${{ matrix.service.name }} (Dry Run)
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: false
          tags: dreamify-${{ matrix.service.name }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────
  #  JOB 4 — COMPOSE VALIDATE
  # ─────────────────────────────────────────────────────────────
  compose-check:
    name: 🔍 Compose Check
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: ✅ Validate Config
        run: |
          touch .env # Create dummy env so variables don't break validation
          docker compose config --quiet && echo "✅ Valid"

  # ─────────────────────────────────────────────────────────────
  #  JOB 5 — PR SUMMARY
  # ─────────────────────────────────────────────────────────────
  pr-comment:
    name: 💬 Post PR Summary
    runs-on: ubuntu-latest
    needs: [secret-scan, backend-check, docker-build-check, compose-check]
    if: always()
    steps:
      - name: 💬 Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = {
              'Secret Scan':    '${{ needs.secret-scan.result }}',
              'Backend Logic':  '${{ needs.backend-check.result }}',
              'Docker Images':  '${{ needs.docker-build-check.result }}',
              'Docker Compose': '${{ needs.compose-check.result }}'
            };

            const icon = (r) => r === 'success' ? '✅' : r === 'skipped' ? '⏭️' : '❌';
            const allPassed = Object.values(jobs).every(r => r === 'success' || r === 'skipped');

            const rows = Object.entries(jobs)
              .map(([k, v]) => `| ${icon(v)} | ${k} | \`${v}\` |`)
              .join('\n');

            const body = `## 🔍 PR Quality Gate — ${allPassed ? '✅ Passed' : '❌ Failed'}
            
            | | Check | Status |
            |---|---|---|
            ${rows}

            ${allPassed 
              ? '> 🚀 Ready for review and merge!' 
              : '> ⚠️ Please address the failures above.'}`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
