# ═══════════════════════════════════════════════════════════════════
#  DREAMIFY — MASTER DEPLOY PIPELINE (V2.0 - Production Ready)
# ═══════════════════════════════════════════════════════════════════

name: Full Stack Deploy

on:
  push:
    branches: [main]
    paths:
      - "docker-compose.yml"
      - "init.sql"
      - "nginx.conf"
      - ".github/workflows/**"
  workflow_dispatch:
    inputs:
      service:
        description: "Redeploy target"
        required: true
        default: "all"
        type: choice
        options: [all, backend, frontend, admin, mysql, nginx]
      force_rebuild:
        description: "Force pull/recreate?"
        default: false
        type: boolean

jobs:
  validate:
    name: ✅ Validate Config
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
      - name: 🔍 Validate docker-compose
        run: |
          # Create a dummy .env for validation purposes
          touch .env
          docker compose config --quiet && echo "✅ docker-compose.yml is valid"

  deploy:
    name: 🚀 Deploy — ${{ github.event.inputs.service || 'all' }}
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🚀 SSH Execute & Sync
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/dreamify
            
            echo "📥 Pulling latest code from Git..."
            git pull origin main

            # ── SECRET INJECTION ──
            # Re-creating the .env file from GitHub Secrets to ensure consistency
            echo "🔐 Syncing environment variables..."
            echo "MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}" > .env
            echo "MYSQL_USER=${{ secrets.MYSQL_USER }}" >> .env
            echo "MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}" >> .env
            echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
            echo "APP_DOMAIN=${{ secrets.APP_DOMAIN }}" >> .env
            echo "✅ .env file successfully updated."

            # Container Registry Login
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u tusharyadav235 --password-stdin

            SERVICE="${{ github.event.inputs.service || 'all' }}"
            
            if [ "$SERVICE" = "all" ]; then
              echo "🔄 Cleaning up and redeploying full stack..."
              docker compose down
              docker compose pull
              docker compose up -d --remove-orphans --force-recreate
            else
              echo "🔄 Redeploying specific service: $SERVICE"
              docker compose pull $SERVICE
              docker compose stop $SERVICE
              docker compose rm -f $SERVICE
              docker compose up -d --no-deps $SERVICE
            fi

            # Cleanup dangling images to keep t2.micro disk healthy
            echo "🧹 Cleaning up old Docker images..."
            docker image prune -f

      - name: 🩺 Smoke Test (HTTPS)
        run: |
          echo "Waiting for services to stabilize (15s)..."
          sleep 15
          
          # We check the status of your domain
          STATUS=$(curl -s -L -o /dev/null -w "%{http_code}" https://dreamify.info)
          
          if [ "$STATUS" = "200" ]; then
            echo "✅ SUCCESS: Dreamify.info is LIVE (HTTP 200)"
          elif [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ]; then
            echo "⚠️ WARNING: Site returned a redirect ($STATUS). Check Nginx config."
          else
            echo "❌ ERROR: Dreamify.info returned HTTP $STATUS"
            exit 1
          fi
