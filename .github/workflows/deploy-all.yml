# ═══════════════════════════════════════════════════════════════════
#  DREAMIFY — MASTER DEPLOY PIPELINE (V2.1 - Production Optimized)
# ═══════════════════════════════════════════════════════════════════

name: Full Stack Deploy

on:
  push:
    branches: [main]
    # Trigger on ANY file change so admin-panel updates are captured
    paths:
      - "**"
  workflow_dispatch:
    inputs:
      service:
        description: "Redeploy target"
        required: true
        default: "all"
        type: choice
        options: [all, backend, frontend, admin, mysql, nginx]

jobs:
  validate:
    name: ✅ Validate Config
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
      - name: 🔍 Validate docker-compose
        run: |
          touch .env
          docker compose config --quiet && echo "✅ docker-compose.yml is valid"

  deploy:
    name: 🚀 Deploy — ${{ github.event.inputs.service || 'all' }}
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🚀 SSH Execute & Sync
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/dreamify
            
            echo "📥 Syncing EC2 with GitHub Main..."
            git fetch --all
            git reset --hard origin/main

            # ── SECRET INJECTION ──
            echo "🔐 Syncing environment variables..."
            echo "MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}" > .env
            echo "MYSQL_USER=${{ secrets.MYSQL_USER }}" >> .env
            echo "MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}" >> .env
            echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
            echo "APP_DOMAIN=${{ secrets.APP_DOMAIN }}" >> .env
            echo "✅ .env successfully updated."

            # Container Registry Login
            echo "🔑 Logging into GHCR..."
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u tusharyadav235 --password-stdin

            SERVICE="${{ github.event.inputs.service || 'all' }}"
            
            if [ "$SERVICE" = "all" ]; then
              echo "🔄 Full Stack Reset: Cleaning up and redeploying..."
              docker compose down
              docker compose pull
              docker compose up -d --remove-orphans
            else
              echo "🔄 Targeted Redeploy: $SERVICE"
              docker compose pull $SERVICE
              # stop/rm ensures the old version is wiped before 'up' starts the new one
              docker compose stop $SERVICE
              docker compose rm -f $SERVICE
              docker compose up -d --no-deps --force-recreate $SERVICE
            fi

            # Cleanup to save t2.micro disk space
            echo "🧹 Cleaning up old Docker layers..."
            docker image prune -f

      - name: 🩺 Smoke Test
        run: |
          echo "Waiting for services to stabilize (15s)..."
          sleep 15
          
          # Check site status
          STATUS=$(curl -s -L -o /dev/null -w "%{http_code}" https://dreamify.info)
          
          if [ "$STATUS" = "200" ]; then
            echo "✅ SUCCESS: Dreamify.info is LIVE (HTTP 200)"
          else
            echo "❌ ERROR: Dreamify.info returned HTTP $STATUS"
            exit 1
          fi
