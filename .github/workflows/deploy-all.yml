# ═══════════════════════════════════════════════════════════════════
#  DREAMIFY — MASTER DEPLOY PIPELINE
# ═══════════════════════════════════════════════════════════════════

name: Full Stack Deploy

on:
  push:
    branches: [main]
    paths:
      - "docker-compose.yml"
      - "init.sql"
      - ".env.example"
  workflow_dispatch:
    inputs:
      service:
        description: "Redeploy target"
        required: true
        default: "all"
        type: choice
        options: [all, backend, frontend, admin, mysql]
      force_rebuild:
        description: "Force pull/recreate?"
        default: false
        type: boolean

jobs:
  validate:
    name: ✅ Validate Config
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
      - name: 🔍 Validate docker-compose
        run: |
          touch .env
          docker compose config --quiet && echo "✅ Valid"

  deploy:
    name: 🚀 Deploy — ${{ github.event.inputs.service || 'all' }}
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🚀 SSH Execute
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/dreamify
            git pull origin main

            # Login using your permanent PAT
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u tusharyadav235 --password-stdin

            SERVICE="${{ github.event.inputs.service || 'all' }}"
            
            if [ "$SERVICE" = "all" ]; then
              docker compose pull
              docker compose up -d --remove-orphans
            else
              docker compose pull $SERVICE
              docker compose up -d --no-deps $SERVICE
            fi

            docker image prune -f

      - name: 🩺 Smoke Test (HTTPS)
        run: |
          echo "Checking site health..."
          sleep 15
          # Test the main landing page via HTTPS
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://dreamify.info)
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ]; then
            echo "✅ Dreamify.info is LIVE (HTTP $STATUS)"
          else
            echo "❌ Dreamify.info is DOWN (HTTP $STATUS)"
            exit 1
          fi
