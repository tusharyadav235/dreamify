# ═══════════════════════════════════════════════════════════════════
#  DREAMIFY — ADMIN PANEL CI/CD PIPELINE
#  Optimized for GHCR + EC2 Deployment
# ═══════════════════════════════════════════════════════════════════

name: Admin Panel CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "admin-panel/**"
      - ".github/workflows/admin.yml"
  pull_request:
    branches: [main]
    paths:
      - "admin-panel/**"

env:
  REGISTRY: ghcr.io
  # Converts repository name to lowercase to avoid Docker tagging errors
  IMAGE_NAME: tusharyadaav/dreamify-admin

jobs:
  build:
    name: 🐳 Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build and push
        uses: docker/build-push-action@v5
        with:
          context: admin-panel
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            set -e
            cd ~/dreamify
            
            # 1. Update the docker-compose and configs from Git
            git pull origin main
            
            # 2. Login to Registry on EC2 
            # Note: Best to use a PAT (Personal Access Token) stored in secrets.GHCR_TOKEN
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 3. Pull and restart ONLY the admin container
            docker compose pull admin
            docker compose up -d --no-deps admin
            
            # 4. Cleanup old images to save memory/disk
            docker image prune -f
            echo "🎉 Admin deployment complete!"
