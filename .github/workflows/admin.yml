# ═══════════════════════════════════════════════════════════════════
#  DREAMIFY — ADMIN PANEL CI/CD PIPELINE (V2.2 - GHCR + EC2)
# ═══════════════════════════════════════════════════════════════════

name: Admin Panel CI/CD

on:
  push:
    branches: [main]
    # Triggers only when changes are made to the admin folder or this workflow
    paths:
      - "admin-panel/**"
      - ".github/workflows/admin.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Ensure this matches the image name in your docker-compose.yml
  IMAGE_NAME: tusharyadav235/dreamify-admin

jobs:
  # 🐳 JOB 1: BUILD & PUSH
  build:
    name: 🐳 Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build and push
        uses: docker/build-push-action@v5
        with:
          context: admin-panel
          # Points to the Dockerfile inside your admin-panel folder
          file: admin-panel/Dockerfile 
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 🚀 JOB 2: DEPLOY
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/dreamify
            
            echo "🌿 1. Forcing Git Sync to match GitHub Main..."
            git fetch --all
            git reset --hard origin/main
            
            echo "🔑 2. Authenticating with GHCR..."
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            echo "🐳 3. Pulling fresh Admin image from GHCR..."
            docker compose pull admin
            
            echo "🚀 4. Hard-recreating Admin container..."
            # --no-deps prevents restarting the DB/Backend
            # --force-recreate bypasses Docker's cache to use the new image layers
            docker compose up -d --no-deps --force-recreate admin
            
            echo "🧹 5. Pruning old images to save EC2 disk space..."
            docker image prune -f
            
            echo "🎉 [SUCCESS] Admin Panel is updated and LIVE!"
