spring.application.name=dreamify-backend
server.port=8080

# MySQL Database
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:dreamify}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:dreamify123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# File Upload - allow large video files up to 500MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Upload storage path (mapped as Docker volume)
app.upload.dir=${UPLOAD_DIR:/app/uploads}
# Public URL base - used to build the video URL returned to frontend
app.upload.base-url=${APP_DOMAIN:http://localhost:8080}/uploads

# Logging
logging.level.com.dreamify=INFO
logging.level.org.hibernate.SQL=WARN