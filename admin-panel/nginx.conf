server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_min_length 1000;
    client_max_body_size 500M;

    # ── KEY FIX ──────────────────────────────────────────────────────────
    # Use Docker's internal DNS resolver (127.0.0.11).
    # Without this, nginx tries to resolve "backend" at startup,
    # fails because Docker DNS isn't ready yet, and crashes with:
    # "host not found in upstream backend"
    #
    # valid=30s  → re-resolve every 30 seconds (handles container restarts)
    # ipv6=off   → skip IPv6 lookups on Docker bridge network
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── API proxy ─────────────────────────────────────────────────────────
    # MUST use set $var — this forces runtime DNS resolution per request
    # A hardcoded proxy_pass http://backend:8080 would still fail at startup
    location /api/ {
        set $upstream_backend http://backend:8080;
        proxy_pass         $upstream_backend/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        client_max_body_size  500M;
    }

    # ── Uploaded videos/thumbnails ────────────────────────────────────────
    location /uploads/ {
        set $upstream_backend http://backend:8080;
        proxy_pass         $upstream_backend/uploads/;
        proxy_set_header   Host      $host;
        proxy_buffering    off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Admin SPA ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
}
