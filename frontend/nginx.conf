server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_min_length 1000;

    # Increase body size for any proxied uploads (nginx sits in front)
    client_max_body_size 500M;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Proxy uploaded videos/thumbnails from backend storage
    # URL: /uploads/filename.mp4 → backend:8080/uploads/filename.mp4
    location /uploads/ {
        proxy_pass         http://backend:8080/uploads/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_buffering    off;
        # Allow large video files to stream properly
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Proxy API calls to backend
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_read_timeout    300s;   # long timeout for file uploads
        # Required for multipart uploads
        client_max_body_size 500M;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
}